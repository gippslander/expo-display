<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gippslander Live Jobs Expo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #E1F0F7;      
            --header-bg: #FFFFFF;     
            --text-main: #1a1a1a;
            --text-muted: #555555;
            --live-color: #ff3b30;    
            --offline-color: #ffca28;
            --font-main: 'Poppins', sans-serif;
        }

        /* --- PIXEL SHIFTING FOR BURN-IN PROTECTION --- */
        @keyframes pixelShift {
            0%   { transform: translate(0px, 0px); }
            20%  { transform: translate(2px, 1px); }
            40%  { transform: translate(-1px, 2px); }
            60%  { transform: translate(-2px, -1px); }
            80%  { transform: translate(1px, -2px); }
            100% { transform: translate(0px, 0px); }
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        body {
            /* Slowly moves the entire app slightly over a 5-minute loop */
            animation: pixelShift 300s infinite alternate linear;
        }

        *, *:before, *:after { box-sizing: inherit; }

        /* --- Settings Panel --- */
        #settings-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .settings-modal { background: white; padding: 40px; border-radius: 20px; width: 600px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .settings-modal h2 { margin-top: 0; color: var(--primary-color); font-size: 2rem; display: flex; align-items: center; justify-content: space-between; font-weight: 800; }
        
        .settings-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .settings-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .settings-group label { font-weight: 600; color: var(--text-main); font-size: 0.95rem; }
        .settings-group input[type="number"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; width: 100%; font-family: var(--font-main); }
        
        .selected-towns-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; padding: 10px; background: #f4f6f9; border-radius: 8px; min-height: 44px; }
        .town-pill { background: var(--primary-color); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .town-pill button { background: none; border: none; color: white; cursor: pointer; font-weight: bold; padding: 0; opacity: 0.8; font-family: var(--font-main); }
        .filter-row { display: flex; gap: 15px; margin-bottom: 10px; }
        .filter-row input, .filter-row select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; font-family: var(--font-main); }
        .filter-row input { flex: 2; }
        .filter-row select { flex: 1; background-color: white; }
        .town-list-container { border: 1px solid #ccc; border-radius: 8px; height: 180px; overflow-y: auto; background: #fff; }
        .town-item { display: flex; align-items: center; gap: 10px; padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .save-btn { background: var(--primary-color); color: white; border: none; padding: 15px; font-size: 1.2rem; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 10px; font-family: var(--font-main); }
        .reset-link { text-align: center; margin-top: 15px; color: #888; font-size: 0.9rem; cursor: pointer; text-decoration: underline; font-weight: 500; }

        /* --- Main Header --- */
        header { background-color: var(--header-bg); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10; height: 90px; }
        .header-logo { height: 100%; max-height: 50px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        
        /* Bolder LIVE indicator */
        .live-indicator { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .status-live { color: var(--live-color); }
        .status-offline { color: var(--offline-color); }
        .live-dot { width: 16px; height: 16px; border-radius: 50%; background-color: var(--live-color); animation: pulse-live 1.5s infinite; }
        .offline-dot { width: 16px; height: 16px; border-radius: 50%; background-color: var(--offline-color); }
        @keyframes pulse-live { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        .content-wrapper { display: flex; flex: 1; padding: 30px 40px; gap: 30px; min-height: 0; position: relative;}

        /* --- THE EMAIL ALERTS TAKEOVER SCREEN --- */
        #interstitial-view {
            display: none; position: absolute; top: 30px; left: 40px; right: 40px; bottom: 30px;
            border-radius: 20px; color: white; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 20; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            background: linear-gradient(45deg, #1b5e20, #4CAF50, #0d47a1, #4CAF50);
            background-size: 300% 300%; animation: gradientShift 10s ease infinite; overflow: hidden; padding: 20px;
        }

        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .bg-icon { position: absolute; color: rgba(255,255,255,0.1); animation: floatUp 8s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; } }

        .hook-content { z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        
        .hook-kicker { font-size: clamp(1.5rem, 3vh, 2.2rem); font-weight: 800; letter-spacing: 4px; color: white; opacity: 0.9; text-transform: uppercase; margin-bottom: 10px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; animation-delay: 0.1s;}
        .hook-title { font-size: clamp(3.5rem, 7vh, 5.5rem); font-weight: 900; margin-bottom: 15px; line-height: 1.1; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; animation-delay: 0.3s; }
        .hook-sub { font-size: clamp(1.4rem, 2.8vh, 1.8rem); margin-bottom: 30px; opacity: 0.95; font-weight: 500; max-width: 900px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; animation-delay: 0.5s; }
        
        .highlight-town { color: #ffca28; display: inline-block; transition: opacity 0.3s ease, transform 0.3s ease; }

        .hook-qr-box { 
            background: white; padding: 20px 30px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; animation-delay: 0.7s;
        }
        .hook-qr-box img { width: 100%; max-width: 250px; height: auto; }
        .hook-qr-text { color: var(--text-main); font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; margin-bottom: 5px;}

        @keyframes popIn { 0% { transform: scale(0.8) translateY(30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        /* --- Job Display Container --- */
        .job-container { flex: 1.8; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 50px 60px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
        
        .job-card { width: 100%; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        
        .job-card .animate-stagger { opacity: 0; transform: translateY(20px); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; } .delay-4 { animation-delay: 0.4s; } .delay-5 { animation-delay: 0.5s; }

        .job-category { font-size: clamp(1.2rem, 2vh, 1.6rem); color: var(--primary-color); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 2px;}
        .job-title { font-size: clamp(3rem, 6vh, 4.2rem); color: var(--text-main); margin: 0 0 20px 0; font-weight: 900; line-height: 1.1; }
        .job-company { font-size: clamp(1.6rem, 3vh, 2.2rem); color: var(--text-muted); margin: 0 0 25px 0; display: flex; align-items: center; gap: 15px; font-weight: 600;}
        
        .company-logo { max-height: 50px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: floatLogo 4s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .job-details { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        
        .badge { background-color: #f8f9fa; padding: 12px 24px; border-radius: 50px; border: 1.5px solid #e0e0e0; display: flex; align-items: center; gap: 8px; font-weight: 700; color: #444; font-size: clamp(1.1rem, 1.8vh, 1.4rem); }
        .badge svg { width: 24px; height: 24px; }

        .job-description { font-size: clamp(1.4rem, 2.5vh, 1.8rem); color: #666; line-height: 1.6; border-top: 2px dashed #eee; padding-top: 25px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-weight: 400;}

        /* --- Right Sidebar --- */
        .sidebar { flex: 1; background: var(--primary-color); border-radius: 20px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; position: relative; overflow: hidden;}
        
        .sidebar::after { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%); pointer-events: none;}

        .sidebar h2 { font-size: clamp(2.5rem, 4.5vh, 3.5rem); margin-bottom: 12px; font-weight: 900; line-height: 1.1; position: relative; z-index: 2;}
        .sidebar p { font-size: clamp(1.3rem, 2.5vh, 1.8rem); margin-bottom: 25px; opacity: 0.95; font-weight: 500; position: relative; z-index: 2;}
        
        .bounce-icon { width: 50px; height: 50px; margin-bottom: 15px; color: #ffca28; animation: bounce 2s infinite; position: relative; z-index: 2;}
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }
        
        .qr-wrapper { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; z-index: 2; width: 80%; max-width: 280px; display: flex; justify-content: center; align-items: center;}
        .qr-wrapper img { width: 100%; height: auto; display: block; }

        .progress-bar-container { width: 100%; height: 8px; background-color: #f0f0f0; position: absolute; bottom: 0; left: 0; }
        .progress-bar { height: 100%; background-color: var(--primary-color); width: 0%; }
        .loader { font-size: 2rem; color: var(--primary-color); text-align: center; width: 100%; font-weight: 800; }
    </style>
</head>
<body>

    <div id="settings-overlay">
        <div class="settings-modal">
            <h2>⚙️ Expo Setup</h2>
            
            <div class="settings-row">
                <div class="settings-group">
                    <label>Slide Duration (seconds):</label>
                    <input type="number" id="setting-duration" value="15" min="5" max="60">
                </div>
                <div class="settings-group">
                    <label>Alert Screen Frequency (jobs):</label>
                    <input type="number" id="setting-alert-freq" value="5" min="2" max="20" title="How many jobs to show before displaying the email alerts screen.">
                </div>
            </div>

            <div class="settings-group">
                <label>Selected Towns:</label>
                <div id="selected-towns" class="selected-towns-container"></div>
            </div>
            
            <div class="settings-group">
                <div class="filter-row">
                    <input type="text" id="town-search" placeholder="Search to add towns..." onkeyup="renderTownsUI()">
                    <select id="region-filter" onchange="renderTownsUI()"><option value="all">All Regions</option></select>
                </div>
                <div id="town-list" class="town-list-container"></div>
            </div>
            
            <button class="save-btn" onclick="saveSettingsAndStart()">Save & Launch Presentation</button>
            <div class="reset-link" onclick="factoryReset()">Reset all settings to default</div>
        </div>
    </div>

    <header>
        <img src="https://d3535lqr6sqxto.cloudfront.net/logos/rEkuQybTnVw95OUPNTLLVxtGB7t4BbAVgbRJTndj.png" alt="Gippslander Logo" class="header-logo">
        <div class="header-right">
            <div class="live-indicator status-live" id="status-badge"><span class="live-dot" id="status-dot"></span><span id="status-text">Live</span></div>
        </div>
    </header>

    <div class="content-wrapper">
        <div id="interstitial-view">
            <svg class="bg-icon" style="left: 10%; animation-duration: 9s;" xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/><path d="m22 10-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 10"/></svg>
            <svg class="bg-icon" style="left: 80%; animation-duration: 12s; animation-delay: 2s;" xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/><path d="m22 10-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 10"/></svg>
            
            <div class="hook-content">
                <div class="hook-kicker">Free Email Alerts</div>
                <div class="hook-title">Get <span id="dynamic-town" class="highlight-town">local</span> jobs sent<br>straight to your inbox.</div>
                
                <div class="hook-sub">We match 5,000+ Gippslanders with local employers. Scan below to join them.</div>
                <div class="hook-qr-box">
                    <div class="hook-qr-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        Scan with your camera
                    </div>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://gippslander.com.au/alerts&margin=10&color=1a1a1a" alt="Sign Up">
                </div>
            </div>
        </div>

        <div class="job-container" id="main-job-container">
            <div id="job-display"></div>
            <div class="progress-bar-container"><div class="progress-bar" id="progress"></div></div>
        </div>

        <div class="sidebar" id="main-sidebar">
            <h2>Sign up for Alerts</h2>
            <p>Scan to get new jobs in your area sent directly to your phone.</p>
            <svg class="bounce-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <div class="qr-wrapper">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gippslander.com.au/alerts&margin=10&color=1a1a1a" alt="Job Alerts">
            </div>
        </div>
    </div>

    <script>
        const LOCATIONS_URL = 'https://cdn.jsdelivr.net/gh/gippslander/assets@main/locations.json';
        const BASE_API_URL = 'https://gippsland-jobs-proxy.vercel.app/api/jobs?towns=';
        
        let allTowns = [], selectedTowns = ['Inverloch'];
        let displayDuration = 15000;
        let alertFrequency = 5; 
        let jobs = [], currentIndex = 0;
        let slideTimer, backgroundRefreshTimer, townCycleInterval;
        let jobDisplayCounter = 0; 
        let currentTownIndex = 0;

        function factoryReset() { localStorage.clear(); location.reload(); }

        async function initSettings() {
            try {
                const savedDuration = localStorage.getItem('gipps_duration');
                if (savedDuration) { document.getElementById('setting-duration').value = savedDuration; displayDuration = parseInt(savedDuration) * 1000; }
                
                const savedFreq = localStorage.getItem('gipps_alert_freq');
                if (savedFreq) { document.getElementById('setting-alert-freq').value = savedFreq; alertFrequency = parseInt(savedFreq); }

                const savedTowns = localStorage.getItem('gipps_towns');
                if (savedTowns) { const parsed = JSON.parse(savedTowns); if (parsed.length > 0) selectedTowns = parsed; }
                
                const res = await fetch(LOCATIONS_URL);
                allTowns = await res.json();
                allTowns.sort((a, b) => a.label.localeCompare(b.label));
                const regions = [...new Set(allTowns.map(t => t.region).filter(Boolean))].sort();
                const regionSelect = document.getElementById('region-filter');
                regions.forEach(r => { regionSelect.innerHTML += `<option value="${r}">${r}</option>`; });
                
                renderTownsUI();
            } catch (e) { console.error(e); }
        }

        function renderTownsUI() {
            const selectedContainer = document.getElementById('selected-towns');
            const availableContainer = document.getElementById('town-list');
            const searchQuery = document.getElementById('town-search').value.toLowerCase();
            const selectedRegion = document.getElementById('region-filter').value;

            selectedContainer.innerHTML = selectedTowns.length === 0 ? '<span style="color:#888;">No towns selected</span>' : '';
            selectedTowns.forEach(town => { selectedContainer.innerHTML += `<div class="town-pill">${town}<button onclick="toggleTown('${town}')">✕</button></div>`; });

            let availableHtml = '';
            allTowns.forEach(town => {
                if (selectedTowns.includes(town.label)) return;
                if (selectedRegion !== 'all' && town.region !== selectedRegion) return;
                if (searchQuery && !town.label.toLowerCase().includes(searchQuery)) return;
                availableHtml += `<div class="town-item" onclick="toggleTown('${town.label}')"><span class="add-icon">+</span><div><div style="font-weight:bold;">${town.label}</div><div style="color:#888; font-size:0.85em;">${town.region || 'No Region'}</div></div></div>`;
            });
            availableContainer.innerHTML = availableHtml || '<div style="text-align:center; padding: 20px; color:#888;">No matching towns found</div>';
        }

        function toggleTown(t) { if (selectedTowns.includes(t)) selectedTowns = selectedTowns.filter(x => x !== t); else selectedTowns.push(t); renderTownsUI(); }

        function saveSettingsAndStart() {
            if (selectedTowns.length === 0) return alert("Please select at least one town to monitor.");
            
            const sec = document.getElementById('setting-duration').value;
            displayDuration = parseInt(sec) * 1000;
            localStorage.setItem('gipps_duration', sec);
            
            const freq = document.getElementById('setting-alert-freq').value;
            alertFrequency = parseInt(freq);
            localStorage.setItem('gipps_alert_freq', freq);

            localStorage.setItem('gipps_towns', JSON.stringify(selectedTowns));
            document.getElementById('settings-overlay').style.display = 'none';
            
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => {});
            
            fetchJobs(false);
            clearInterval(backgroundRefreshTimer);
            backgroundRefreshTimer = setInterval(() => fetchJobs(true), 15 * 60 * 1000);
        }

        async function fetchJobs(isSilent = false) {
            if (!isSilent) document.getElementById('job-display').innerHTML = '<div class="loader">Fetching jobs...</div>';
            try {
                const response = await fetch(BASE_API_URL + selectedTowns.map(t => encodeURIComponent(t)).join(','));
                const data = await response.json();
                processJobsForRotation(data);
                setLiveStatus(true);
                if (!isSilent) startPresentation();
            } catch (error) {
                const cached = localStorage.getItem('gipps_cached_jobs');
                if (cached) { jobs = JSON.parse(cached); setLiveStatus(false); if (!isSilent) startPresentation(); }
            }
        }

        function processJobsForRotation(data) {
            const active = data.filter(j => j.title && j.final_status === 'active');
            let weighted = [];
            active.forEach(j => { weighted.push(j); if (j.pin_to_top) { weighted.push(j); weighted.push(j); } else if (j.featured) weighted.push(j); });
            for (let i = weighted.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [weighted[i], weighted[j]] = [weighted[j], weighted[i]]; }
            jobs = weighted;
            localStorage.setItem('gipps_cached_jobs', JSON.stringify(jobs));
        }

        function setLiveStatus(isLive) {
            document.getElementById('status-badge').className = isLive ? 'live-indicator status-live' : 'live-indicator status-offline';
            document.getElementById('status-dot').className = isLive ? 'live-dot' : 'offline-dot';
            document.getElementById('status-text').innerText = isLive ? 'Live' : 'Offline (Cached)';
        }

        function startPresentation() { if(jobs.length > 0) { currentIndex = 0; jobDisplayCounter = 0; renderJob(); startTimer(); } }
        function startTimer() { clearInterval(slideTimer); slideTimer = setInterval(() => { currentIndex = (currentIndex + 1) % jobs.length; renderLoop(); }, displayDuration); }

        function renderLoop() {
            jobDisplayCounter++;
            if (jobDisplayCounter >= alertFrequency) { 
                showInterstitial();
                jobDisplayCounter = 0;
            } else {
                renderJob();
            }
        }

        function startTownCycle() {
            const townsToCycle = [...selectedTowns, 'Gippsland'];
            const townSpan = document.getElementById('dynamic-town');
            clearInterval(townCycleInterval);
            currentTownIndex = 0;
            townSpan.innerText = townsToCycle[0];
            
            townCycleInterval = setInterval(() => {
                currentTownIndex = (currentTownIndex + 1) % townsToCycle.length;
                townSpan.style.opacity = 0;
                townSpan.style.transform = 'translateY(-10px)';
                
                setTimeout(() => {
                    townSpan.innerText = townsToCycle[currentTownIndex];
                    townSpan.style.opacity = 1;
                    townSpan.style.transform = 'translateY(0)';
                }, 300); 
            }, 2500); 
        }

        function showInterstitial() {
            document.getElementById('main-job-container').style.display = 'none';
            document.getElementById('main-sidebar').style.display = 'none';
            document.getElementById('interstitial-view').style.display = 'flex';
            
            startTownCycle(); 
            
            const progressBar = document.getElementById('progress');
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            setTimeout(() => { progressBar.style.transition = `width ${displayDuration}ms linear`; progressBar.style.width = '100%'; }, 50);
        }

        function renderJob() {
            clearInterval(townCycleInterval); 
            document.getElementById('interstitial-view').style.display = 'none';
            document.getElementById('main-job-container').style.display = 'flex';
            document.getElementById('main-sidebar').style.display = 'flex';
            
            const job = jobs[currentIndex];
            const logo = job.employer?.logo ? `<img src="${job.employer.logo}" class="company-logo">` : '';
            const location = (job.location || '').replace(/,\s*Victoria,\s*Australia/i, '');
            const cleanDesc = (job.description || '').replace(/<[^>]*>/g, '');
            const shortDesc = cleanDesc.length > 250 ? cleanDesc.substring(0, 250) + '...' : cleanDesc;
            
            let isNewlyListed = false;
            const jobDateStr = job.created_at || job.published_at || job.date; 
            if (jobDateStr) {
                try {
                    const posted = new Date(jobDateStr);
                    const today = new Date();
                    const daysOld = (today - posted) / (1000 * 60 * 60 * 24);
                    if (daysOld <= 7 && daysOld >= 0) isNewlyListed = true;
                } catch(e) {}
            }
            
            const flameSvg = `<svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`;
            const eyeSvg = `<svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
            const pinSvg = `<svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.59a2 2 0 0 0-.59-1.42l-1.83-1.83c-.38-.38-.59-.88-.59-1.42V6a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v4.74c0 .54-.21 1.04-.59 1.42l-1.83 1.83A2 2 0 0 0 5 15.41Z"/></svg>`;
            const starSvg = `<svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
            const clockSvg = `<svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
            const locationSvg = `<svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;

            let badges = '';
            
            if (job.pin_to_top) {
                badges += `<span class="badge animate-stagger delay-4" style="background:#fff8e1; border-color:#ffca28; color:#f57f17;">${pinSvg} Premium</span>`;
            } else if (job.featured) {
                badges += `<span class="badge animate-stagger delay-4" style="background:#fffde7; border-color:#fff59d; color:#fbc02d;">${starSvg} Featured</span>`;
            }

            if (isNewlyListed) {
                badges += `<span class="badge animate-stagger delay-5" style="background:#e8f5e9; border-color:#81c784; color:#1b5e20;">${clockSvg} Newly Listed</span>`;
            }

            const applies = job.statistics?.applies_count || 0;
            const views = job.statistics?.views_count || 0;

            if (applies >= 5) {
                badges += `<span class="badge animate-stagger delay-5" style="background:#fff3e0; border-color:#ffb74d; color:#e65100;">${flameSvg} ${applies} applied</span>`;
            } else if (applies > 0) {
                badges += `<span class="badge animate-stagger delay-5" style="background:#fff3e0; border-color:#ffb74d; color:#e65100;">${flameSvg} Fast Moving</span>`;
            } else if (views >= 25) {
                badges += `<span class="badge animate-stagger delay-5" style="background:#e3f2fd; border-color:#64b5f6; color:#0d47a1;">${eyeSvg} ${views} people viewing</span>`;
            } else if (views >= 10) {
                badges += `<span class="badge animate-stagger delay-5" style="background:#e3f2fd; border-color:#64b5f6; color:#0d47a1;">${eyeSvg} Popular</span>`;
            }

            document.getElementById('job-display').innerHTML = `
                <div class="job-card">
                    <div class="job-category animate-stagger delay-1">${job.category?.name || 'General'}</div>
                    <h2 class="job-title animate-stagger delay-2">${job.title}</h2>
                    <h3 class="job-company animate-stagger delay-3">${logo} ${job.employer?.name || 'Local Employer'}</h3>
                    <div class="job-details">
                        <span class="badge animate-stagger delay-4" style="color:var(--primary-color); border-color:var(--primary-color);">${locationSvg} ${location}</span>
                        ${badges}
                    </div>
                    <div class="job-description animate-stagger delay-5">"${shortDesc}"</div>
                </div>
            `;

            const progressBar = document.getElementById('progress');
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            setTimeout(() => { progressBar.style.transition = `width ${displayDuration}ms linear`; progressBar.style.width = '100%'; }, 50);
        }

        initSettings();
    </script>
</body>
</html>
